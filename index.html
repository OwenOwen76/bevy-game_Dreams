<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreams</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌙</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
            outline: none;
        }

        #loading {
            position: absolute;
            color: #fff;
            font-family: monospace;
            font-size: 1.2rem;
            text-align: center;
        }

        #loading.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="loading">Loading Dreams...</div>
    <script src="./pkg/My_Game.js"></script>
    <script type="module">
        wasm_bindgen("./pkg/My_Game_bg.wasm").then(() => {
            document.getElementById('loading').classList.add('hidden');
        }).catch((err) => {
            document.getElementById('loading').textContent = `Error: ${err.message}`;
            console.error(err);
        });
    </script>
</body>
</html>
